<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
</head>
<body>
    <center>
    <h1>Contact Form</h1>
    <form>
        <label> Name: </label> <input type="text" name="name" placeholder="Enter your name" required><br><br>
        <label> Email: </label> <input type="email" name="email" placeholder="Enter your email" required><br><br>
        <label> Phone: </label> <input type="tel" name="phone" placeholder="Enter your phone number" required><br><br>
        <label> Password: </label> <input type="password" name="password" placeholder="Enter your password" required><br><br>
        <button type="submit">Submit</button>
    </form>
    </center>
</body>
</html>
